<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>舟舟博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">

            <img src="zz.jpg" alt="舟舟博客Logo" class="logo-img">

    <div class="search-icon" id="searchIcon">🔍</div>
</div>

<!-- 搜索框 -->
<div class="search-box" id="searchBox">
