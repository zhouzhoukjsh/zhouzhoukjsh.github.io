<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>舟舟博客</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="zz.ico" type="image/x-icon">
</head>
<body>

<div class="header">
    <!-- 左侧所有内容：必须用一个 flex 容器包裹，禁止换行 -->
    <div class="left-group">
        <!-- Logo + 标题：必须内联为一个整体 -->
        <a href="index.html" class="logo-link">
            <img src="zz.jpg" alt="舟舟博客Logo" class="logo-img">
            <span class="site-title">舟舟博客</span>
        </a>

        <!-- 导航菜单 -->
        <div class="nav-menu">
            <a href="index.html" class="active">主页</a>
            <a href="#">视频教程</a>
            <a href="#">图文教程</a>
            <a href="#">联系我</a>
        </div>

        <!-- 舟舟系统 -->
        <a href="#" class="system-link">
            <img src="zzxt.png" alt="舟舟系统" class="system-img">
            <span>舟舟系统</span>
        </a>
    </div>

    <!-- 搜索图标：自动推到最右 -->
    <div class="search-icon" id="searchIcon">🔍</div>
</div>

<!-- 搜索框 -->
<div class="search-box" id="searchBox">
    <input type="text" placeholder="搜索..." id="searchInput">
</div>

<div class="main-content">
    <h1 class="section-title">最新教程</h1>
    <p class="section-subtitle">暂无</p>
</div>

<script src="script.js"></script>
</body>
</html>
